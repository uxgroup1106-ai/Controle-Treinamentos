<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UX Group — Central de Suporte</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#ffffff;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem}
  .logo-wrap{text-align:center;margin-bottom:2rem}
  .logo-wrap img{height:44px;object-fit:contain}
  .tagline{font-size:0.88rem;color:#888;margin-top:6px;letter-spacing:0.03em}
  .card{background:#fff;border:1.5px solid #e5e5e5;border-radius:20px;padding:2.5rem 2rem;max-width:460px;width:100%;text-align:center}
  .icon-wrap{width:68px;height:68px;border-radius:50%;background:#f3f3f3;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem}
  .icon-wrap svg{width:30px;height:30px}
  h1{font-size:1.4rem;font-weight:700;margin-bottom:0.65rem;color:#111}
  p{font-size:0.93rem;color:#666;line-height:1.7;margin-bottom:2rem}
  .btn{display:inline-flex;align-items:center;gap:10px;background:#111;color:#fff;border:none;border-radius:12px;padding:0.85rem 2rem;font-size:0.95rem;font-weight:600;cursor:pointer;transition:background 0.2s,transform 0.1s;width:100%;justify-content:center}
  .btn:hover{background:#333}
  .btn:active{transform:scale(0.98)}
  .btn svg{width:18px;height:18px;flex-shrink:0}
  .divider{border:none;border-top:1px solid #e5e5e5;margin:1.75rem 0}
  .section-label{font-size:0.72rem;color:#999;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:1rem}
  .channels{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}
  .ch{background:#f9f9f9;border:1px solid #e8e8e8;border-radius:12px;padding:0.9rem 1rem;display:flex;flex-direction:column;align-items:center;gap:5px}
  .ch svg{width:20px;height:20px;stroke:#555}
  .ch-label{font-size:0.73rem;color:#999}
  .ch-value{font-size:0.83rem;font-weight:600;color:#222}
  .footer{margin-top:2rem;font-size:0.75rem;color:#bbb;text-align:center}
  @media(max-width:480px){.card{padding:2rem 1.25rem}.channels{grid-template-columns:1fr}}
</style>
</head>
